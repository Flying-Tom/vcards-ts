name: Sync and Deploy

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨同步一次
  workflow_dispatch: # 支持手动触发

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限以允许 push

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Clone source repository
        run: |
          git clone --depth 1 https://github.com/metowolf/vCards.git upstream-repo

      - name: Merge data from upstream
        run: |
          echo "Merging data from upstream..."
          # 遍历 upstream-repo/data 下的所有分类目录
          for category_dir in upstream-repo/data/*/; do
            if [ -d "$category_dir" ]; then
              category=$(basename "$category_dir")
              # 排除掉我们手动维护的“国际服务”目录，避免被覆盖（如果上游也有同名目录）
              if [ "$category" = "国际服务" ]; then
                continue
              fi
              mkdir -p "data/$category"
              # 复制文件。-n 表示不覆盖本地已有的文件
              # 如果你希望上游更新时也同步更新，可以去掉 -n，改为直接 cp
              cp -vn "$category_dir"*.yaml "data/$category/" 2>/dev/null || true
              cp -vn "$category_dir"*.png "data/$category/" 2>/dev/null || true
            fi
          done
          rm -rf upstream-repo

      - name: Run Tests
        run: pnpm test

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 只有在有变化时才提交，防止 workflow 报错
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync data from upstream $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to sync."
          fi
